<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Seamless tileable fintech doodle pattern.
       Low-contrast zinc-400 strokes at 4-6% opacity on transparent bg.
       Reads as subtle texture, not illustration. -->

  <defs>
    <style>
      .grid { stroke: #a1a1aa; stroke-width: 0.5; fill: none; opacity: 0.04; }
      .shape { stroke: #a1a1aa; stroke-width: 0.8; fill: none; opacity: 0.055; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #a1a1aa; opacity: 0.06; }
      .dash { stroke: #a1a1aa; stroke-width: 0.6; fill: none; opacity: 0.04; stroke-dasharray: 3 4; }
    </style>
  </defs>

  <!-- Background grid — very faint blueprint feel -->
  <line class="grid" x1="0" y1="50" x2="200" y2="50" />
  <line class="grid" x1="0" y1="100" x2="200" y2="100" />
  <line class="grid" x1="0" y1="150" x2="200" y2="150" />
  <line class="grid" x1="50" y1="0" x2="50" y2="200" />
  <line class="grid" x1="100" y1="0" x2="100" y2="200" />
  <line class="grid" x1="150" y1="0" x2="150" y2="200" />

  <!-- Card / panel outline (top-left quadrant) -->
  <rect class="shape" x="12" y="12" width="32" height="24" rx="3" />
  <line class="shape" x1="17" y1="20" x2="39" y2="20" />
  <line class="shape" x1="17" y1="25" x2="32" y2="25" />
  <line class="shape" x1="17" y1="30" x2="27" y2="30" />

  <!-- Checklist (top-right area) -->
  <rect class="shape" x="118" y="14" width="7" height="7" rx="1" />
  <line class="shape" x1="130" y1="17" x2="155" y2="17" />
  <rect class="shape" x="118" y="28" width="7" height="7" rx="1" />
  <line class="shape" x1="130" y1="31" x2="148" y2="31" />
  <!-- Checkmark in first box -->
  <polyline class="shape" points="120,17.5 121.5,19.5 124,15" />

  <!-- Mini bar chart (center-left) -->
  <rect class="shape" x="18" y="82" width="5" height="14" rx="1" />
  <rect class="shape" x="26" y="76" width="5" height="20" rx="1" />
  <rect class="shape" x="34" y="80" width="5" height="16" rx="1" />
  <rect class="shape" x="42" y="72" width="5" height="24" rx="1" />

  <!-- Node + connector (center) -->
  <circle class="dot" cx="85" cy="70" r="3" />
  <circle class="dot" cx="115" cy="70" r="3" />
  <circle class="dot" cx="100" cy="90" r="3" />
  <line class="dash" x1="88" y1="70" x2="112" y2="70" />
  <line class="dash" x1="86" y1="73" x2="98" y2="88" />
  <line class="dash" x1="114" y1="73" x2="102" y2="88" />

  <!-- Calendar / tab shape (right side) -->
  <rect class="shape" x="140" y="68" width="40" height="30" rx="3" />
  <line class="shape" x1="140" y1="77" x2="180" y2="77" />
  <line class="shape" x1="152" y1="68" x2="152" y2="77" />
  <line class="shape" x1="168" y1="68" x2="168" y2="77" />
  <!-- Calendar dots -->
  <circle class="dot" cx="148" cy="84" r="1.2" />
  <circle class="dot" cx="156" cy="84" r="1.2" />
  <circle class="dot" cx="164" cy="84" r="1.2" />
  <circle class="dot" cx="172" cy="84" r="1.2" />
  <circle class="dot" cx="148" cy="91" r="1.2" />
  <circle class="dot" cx="156" cy="91" r="1.2" />

  <!-- Flow arrow (bottom-left) -->
  <rect class="shape" x="10" y="130" width="28" height="16" rx="8" />
  <line class="shape" x1="42" y1="138" x2="58" y2="138" />
  <polyline class="shape" points="54,134 58,138 54,142" />
  <rect class="shape" x="62" y="130" width="28" height="16" rx="8" />

  <!-- Tiny sparkline (bottom-center) -->
  <polyline class="shape" points="108,145 115,138 122,142 129,132 136,136 143,128 150,135" />

  <!-- Data panel / table (bottom-right) -->
  <rect class="shape" x="138" y="128" width="48" height="32" rx="3" />
  <line class="shape" x1="138" y1="137" x2="186" y2="137" />
  <line class="shape" x1="158" y1="137" x2="158" y2="160" />
  <line class="shape" x1="138" y1="148" x2="186" y2="148" />

  <!-- Scattered connector dots (edges, for seamless tiling) -->
  <circle class="dot" cx="0" cy="0" r="2" />
  <circle class="dot" cx="200" cy="0" r="2" />
  <circle class="dot" cx="0" cy="200" r="2" />
  <circle class="dot" cx="200" cy="200" r="2" />
  <circle class="dot" cx="100" cy="0" r="1.5" />
  <circle class="dot" cx="0" cy="100" r="1.5" />
  <circle class="dot" cx="200" cy="100" r="1.5" />
  <circle class="dot" cx="100" cy="200" r="1.5" />

  <!-- Diagonal accent lines (very faint) -->
  <line class="grid" x1="60" y1="110" x2="80" y2="125" />
  <line class="grid" x1="160" y1="10" x2="190" y2="40" />

  <!-- Small toggle / switch -->
  <rect class="shape" x="65" y="40" width="20" height="10" rx="5" />
  <circle class="dot" cx="80" cy="45" r="3.5" />

  <!-- Signal / wifi icon hint -->
  <path class="shape" d="M 18,170 Q 18,162 26,162 Q 34,162 34,170" />
  <path class="shape" d="M 22,170 Q 22,166 26,166 Q 30,166 30,170" />
  <circle class="dot" cx="26" cy="171" r="1.5" />

  <!-- Bracket / code hint -->
  <path class="shape" d="M 72,165 L 68,172 L 72,179" />
  <path class="shape" d="M 88,165 L 92,172 L 88,179" />
  <line class="shape" x1="74" y1="175" x2="86" y2="169" />
</svg>
